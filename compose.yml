services:
  postgres:
    image: postgres:16-alpine
    container_name: messenger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - messenger_postgres_data:/var/lib/postgresql/data
    networks:
      - messenger_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: messenger-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - messenger_network
    volumes:
      - messenger_pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: messenger-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL_MINUTES: ${JWT_ACCESS_TOKEN_TTL_MINUTES}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - messenger_maven_cache:/root/.m2
    working_dir: /app
    networks:
      - messenger_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: messenger-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL}
      VITE_USE_POLLING: ${VITE_USE_POLLING}
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - messenger_frontend_node_modules:/app/node_modules
    working_dir: /app
    networks:
      - messenger_network
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: messenger-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - messenger_network

networks:
  messenger_network:
    driver: bridge

volumes:
  messenger_postgres_data:
  messenger_pgadmin_data:
  messenger_maven_cache:
  messenger_frontend_node_modules: