spring:
  application:
    name: messenger

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:messenger}
    username: ${DB_USER:messenger}
    password: ${DB_PASSWORD:messenger_password}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change_me_to_a_long_random_secret_at_least_32_chars}
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:30}

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO